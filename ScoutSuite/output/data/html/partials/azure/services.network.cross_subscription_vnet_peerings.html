<!-- network cross-subscription vnet peerings -->
<script id="services.network.cross_subscription_vnet_peerings.partial" type="text/x-handlebars-template">
    <div id="resource-name" class="list-group-item active">
        <h4 class="list-group-item-heading">{{name}}</h4>
    </div>
    <div class="list-group-item">
        <h4 class="list-group-item-heading">Information</h4>
        <div class="list-group-item-text item-margin">Local Subscription: <span id="network.cross_subscription_vnet_peerings.{{@key}}.local_subscription_name"><samp>{{value_or_none local_subscription_name}}</samp></span></div>
        <div class="list-group-item-text item-margin">Local Environment: <span id="network.cross_subscription_vnet_peerings.{{@key}}.local_environment"><samp>{{value_or_none local_environment}}</samp></span></div>
        <div class="list-group-item-text item-margin">Local Virtual Network: <span id="network.cross_subscription_vnet_peerings.{{@key}}.local_virtual_network_name"><samp>{{value_or_none local_virtual_network_name}}</samp></span></div>
        <div class="list-group-item-text item-margin">Remote Subscription: <span id="network.cross_subscription_vnet_peerings.{{@key}}.remote_subscription_name"><samp>{{value_or_none remote_subscription_name}}</samp></span></div>
        <div class="list-group-item-text item-margin">Remote Environment: <span id="network.cross_subscription_vnet_peerings.{{@key}}.remote_environment"><samp>{{value_or_none remote_environment}}</samp></span></div>
        <div class="list-group-item-text item-margin">Remote Virtual Network: <span id="network.cross_subscription_vnet_peerings.{{@key}}.remote_virtual_network_name"><samp>{{value_or_none remote_virtual_network_name}}</samp></span></div>
        <div class="list-group-item-text item-margin">Peering Name: <span id="network.cross_subscription_vnet_peerings.{{@key}}.peering_name"><samp>{{value_or_none peering_name}}</samp></span></div>
        <div class="list-group-item-text item-margin">Allows Virtual Network Access: <span id="network.cross_subscription_vnet_peerings.{{@key}}.allow_virtual_network_access">{{convert_bool_to_enabled allow_virtual_network_access}}</span></div>
        <div class="list-group-item-text item-margin">Cross-Environment: <span id="network.cross_subscription_vnet_peerings.{{@key}}.is_cross_environment">{{convert_bool_to_enabled is_cross_environment}}</span></div>
    </div>
</script>

<script>
    Handlebars.registerPartial("services.network.cross_subscription_vnet_peerings", $("#services\\.network\\.cross_subscription_vnet_peerings\\.partial").html());
</script>

<!-- Single template -->
<script id="single_network_cross_subscription_vnet_peering-template" type="text/x-handlebars-template">
    {{> modal-template template='services.network.cross_subscription_vnet_peerings'}}
</script>
<script>
    var single_network_cross_subscription_vnet_peering_template = Handlebars.compile($("#single_network_cross_subscription_vnet_peering-template").html());
</script>
