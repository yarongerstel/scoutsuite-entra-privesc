<!-- rbac standing privileged subscription role assignments -->
<script id="services.rbac.subscriptions.id.standing_privileged_role_assignments.partial" type="text/x-handlebars-template">
    <div id="resource-name" class="list-group-item active">
        <h4 class="list-group-item-heading">{{name}}</h4>
    </div>
    <div class="list-group-item">
        <h4 class="list-group-item-heading">Information</h4>
        <div class="list-group-item-text item-margin">Principal: <span id="rbac.subscriptions.{{@../key}}.standing_privileged_role_assignments.{{@key}}.principal_name"><samp>{{value_or_none principal_name}}</samp></span></div>
        <div class="list-group-item-text item-margin">Principal Type: <span id="rbac.subscriptions.{{@../key}}.standing_privileged_role_assignments.{{@key}}.principal_type"><samp>{{value_or_none principal_type}}</samp></span></div>
        <div class="list-group-item-text item-margin">Principal ID: <span id="rbac.subscriptions.{{@../key}}.standing_privileged_role_assignments.{{@key}}.principal_id"><samp>{{value_or_none principal_id}}</samp></span></div>
        <div class="list-group-item-text item-margin">Role: <span id="rbac.subscriptions.{{@../key}}.standing_privileged_role_assignments.{{@key}}.role_name"><samp>{{value_or_none role_name}}</samp></span></div>
        <div class="list-group-item-text item-margin">Subscription: <span id="rbac.subscriptions.{{@../key}}.standing_privileged_role_assignments.{{@key}}.subscription_id"><samp>{{getValueAt 'services.rbac.subscriptions' @../key 'display_name'}} ({{@../key}})</samp></span></div>
    </div>
</script>

<script>
    Handlebars.registerPartial("services.rbac.subscriptions.id.standing_privileged_role_assignments", $("#services\\.rbac\\.subscriptions\\.id\\.standing_privileged_role_assignments\\.partial").html());
</script>

<!-- Single template -->
<script id="single_rbac_standing_privileged_role_assignment-template" type="text/x-handlebars-template">
    {{> modal-template template='services.rbac.subscriptions.id.standing_privileged_role_assignments'}}
</script>
<script>
    var single_rbac_standing_privileged_role_assignment_template = Handlebars.compile($("#single_rbac_standing_privileged_role_assignment-template").html());
</script>
