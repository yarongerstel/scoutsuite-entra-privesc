<!-- aad enterprise apps with strong subscription roles -->
<script id="services.aad.enterprise_apps_with_strong_subscription_roles.partial" type="text/x-handlebars-template">
    <div id="resource-name" class="list-group-item active">
        <h4 class="list-group-item-heading">{{name}}</h4>
    </div>
    <div class="list-group-item">
        <h4 class="list-group-item-heading">Information</h4>
        <div class="list-group-item-text item-margin">Name: <span id="aad.enterprise_apps_with_strong_subscription_roles.{{@key}}.name"><samp>{{value_or_none name}}</samp></span></div>
        <div class="list-group-item-text item-margin">Service Principal Type: <span id="aad.enterprise_apps_with_strong_subscription_roles.{{@key}}.service_principal_type"><samp>{{value_or_none service_principal_type}}</samp></span></div>
        <div class="list-group-item-text item-margin">App ID: <span id="aad.enterprise_apps_with_strong_subscription_roles.{{@key}}.app_id"><samp>{{value_or_none app_id}}</samp></span></div>
        <div class="list-group-item-text item-margin">Role: <span id="aad.enterprise_apps_with_strong_subscription_roles.{{@key}}.role_name"><samp>{{value_or_none role_name}}</samp></span></div>
        <div class="list-group-item-text item-margin">Subscription: <span id="aad.enterprise_apps_with_strong_subscription_roles.{{@key}}.subscription_id"><samp>{{value_or_none subscription_id}}</samp></span></div>
        <div class="list-group-item-text item-margin">Owners: <span id="aad.enterprise_apps_with_strong_subscription_roles.{{@key}}.owners"><samp>{{#each owners}}{{this}}{{#unless @last}}, {{/unless}}{{/each}}</samp></span></div>
    </div>
</script>

<script>
    Handlebars.registerPartial("services.aad.enterprise_apps_with_strong_subscription_roles", $("#services\\.aad\\.enterprise_apps_with_strong_subscription_roles\\.partial").html());
</script>

<!-- Single template -->
<script id="single_aad_enterprise_apps_with_strong_subscription_role-template" type="text/x-handlebars-template">
    {{> modal-template template='services.aad.enterprise_apps_with_strong_subscription_roles'}}
</script>
<script>
    var single_aad_enterprise_apps_with_strong_subscription_role_template = Handlebars.compile($("#single_aad_enterprise_apps_with_strong_subscription_role-template").html());
</script>
